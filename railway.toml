[build]
builder = "nixpacks"
buildCommand = "find . -name '*.pyc' -delete && find . -name __pycache__ -type d -exec rm -rf {} + 2>/dev/null; pip install . && pip install apps/mcp && pip install apps/gsc-agent"

[deploy]
startCommand = "python -B -m gsc_agent.agent"
cronSchedule = "0 6 * * *"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[environments.production.variables]
ENVIRONMENT = "production"
LOG_LEVEL = "INFO"

[environments.staging.variables]
ENVIRONMENT = "staging"
LOG_LEVEL = "DEBUG"

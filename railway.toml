[build]
builder = "nixpacks"
buildCommand = "pip install -e . && pip install -e apps/mcp && pip install -e apps/gsc-agent"

[deploy]
startCommand = "python -m gsc_agent.agent"
cronSchedule = "0 6 * * *"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[environments.production.variables]
ENVIRONMENT = "production"
LOG_LEVEL = "INFO"

[environments.staging.variables]
ENVIRONMENT = "staging"
LOG_LEVEL = "DEBUG"
